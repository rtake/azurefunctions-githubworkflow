name: agent-pr

on:
  workflow_dispatch:
    inputs:
      account_name:
        required: true
        type: string
      project_name:
        required: true
        type: string
      app_name:
        required: true
        type: string
      deployment_name:
        required: true
        type: string
      agent_definition:
        required: true
        type: string
        description: "Base64-encoded JSON string of the agent definition"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug input
        run: |
          echo "===== RAW INPUT (START) ====="
          echo "${{github.event.inputs.agent_definition}}"
          echo "${{github.event.inputs.agent_definition}}" | base64 --decode
          echo "${{github.event.inputs.agent_definition}}" | base64 --decode | jq .          
          echo "===== RAW INPUT (END) ====="

      - name: Validate JSON
        run: |
          set +e
          printf '%s' "${{ github.event.inputs.agent_definition }}" | base64 --decode | jq . > /dev/null
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "❌ Invalid JSON detected"
            exit 1
          else
            echo "✅ JSON is valid"
          fi

      - name: Create branch and write file
        run: |
          set -e

          BRANCH=feature/${{ github.event.inputs.app_name }}/${{ github.event.inputs.deployment_name }}-${{ github.run_id }}
          git checkout -b "$BRANCH"

          DIRECTORY=agents/${{ github.event.inputs.account_name }}/${{ github.event.inputs.project_name }}
          mkdir -p "$DIRECTORY"

          FILE="$DIRECTORY/${{ github.event.inputs.app_name }}.json"

          echo "===== PARSED JSON ====="
          printf '%s' "${{ github.event.inputs.agent_definition }}" | base64 --decode | jq .

          printf '%s' "${{ github.event.inputs.agent_definition }}" \
            | base64 --decode \
            | jq . \
            > "$FILE"

          git config user.name bot
          git config user.email bot@users.noreply.github.com

          git add .
          git commit -m "Add agent"
          git push origin HEAD

      - name: Create PR
        run: |
          gh pr create \
            --title "Update agent ${{ github.event.inputs.app_name }}" \
            --body "Deployment: ${{ github.event.inputs.deployment_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
