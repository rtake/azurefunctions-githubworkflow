name: agent-pr

on:
  workflow_dispatch:
    inputs:
      account_name:
        required: true
        type: string
      project_name:
        required: true
        type: string
      app_name:
        required: true
        type: string
      deployment_name:
        required: true
        type: string
      agent_definition:
        required: true
        type: string
        description: "Base64-encoded JSON string of the agent definition"

# 1つのエージェントに対して複数のPRが同時に存在しないようにする
concurrency:
  group: agent-pr-${{ github.event.inputs.project_name }}-${{ github.event.inputs.app_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Create branch and write file
        id: prepare-branch
        run: |
          set -e

          BRANCH=feature/${{ github.event.inputs.project_name }}/${{ github.event.inputs.app_name }}/${{ github.event.inputs.deployment_name }}
          git checkout -B "$BRANCH"

          DIRECTORY=agents/projects/${{ github.event.inputs.project_name }}
          mkdir -p "$DIRECTORY"

          FILE="$DIRECTORY/${{ github.event.inputs.app_name }}.json"

          echo "===== PARSED JSON ====="
          printf '%s' "${{ github.event.inputs.agent_definition }}" | base64 --decode | jq .

          printf '%s' "${{ github.event.inputs.agent_definition }}" \
            | base64 --decode \
            | jq . \
            > "$FILE"

          git config user.name bot
          git config user.email bot@users.noreply.github.com

          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git commit -m "Add agent"
          git push --force-with-lease origin HEAD

      - name: Check existing PR
        id: existing-pr
        if: steps.prepare-branch.outputs.has_changes == 'true'
        run: |
          set -e

          BRANCH=feature/${{ github.event.inputs.project_name }}/${{ github.event.inputs.app_name }}/${{ github.event.inputs.deployment_name }}
          PR_URL=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json url \
            --jq '.[0].url // ""')

          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        if: steps.prepare-branch.outputs.has_changes == 'true' && steps.existing-pr.outputs.url == ''
        run: |
          gh pr create \
            --title "Update agent ${{ github.event.inputs.app_name }}" \
            --body "Deployment: ${{ github.event.inputs.deployment_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Reuse existing PR
        if: steps.prepare-branch.outputs.has_changes == 'true' && steps.existing-pr.outputs.url != ''
        run: |
          echo "Existing PR found: ${{ steps.existing-pr.outputs.url }}"
