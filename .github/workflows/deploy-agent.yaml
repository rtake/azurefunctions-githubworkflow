name: Deploy Agents

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AIFOUNDRY_ACCOUNT_NAME: ${{ vars.AIFOUNDRY_ACCOUNT_NAME }}
  RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
  PROJECT_NAME: "prod"
  API_VERSION: "2025-10-01-preview"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect changed agents
        id: changes
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^agents/.*\.json$' || true)

          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get Foundry token
        id: foundry_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get ARM token
        id: arm_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://management.azure.com/ \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy changed agents
        if: steps.changes.outputs.files != ''
        env:
          FOUNDRY_TOKEN: ${{ steps.foundry_token.outputs.token }}
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
          FILES: ${{ steps.changes.outputs.files }}
        run: |
          set -euo pipefail

          while IFS= read -r f; do
            [ -z "$f" ] && continue

            AGENT_NAME=$(basename "$f" .json)
            BASE_URL="https://${AIFOUNDRY_ACCOUNT_NAME}.services.ai.azure.com"

            echo "=== Processing ${AGENT_NAME} ==="

            # -----------------------------
            # 1. Create or Update Agent
            # -----------------------------
            GET_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"
            AGENT_JSON=$(mktemp)

            STATUS=$(curl --silent --show-error \
              -o "$AGENT_JSON" \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
              "$GET_URL" || true)

            if [ "$STATUS" = "404" ]; then
              echo "Creating agent ${PROJECT_NAME}/${AGENT_NAME}"

              CREATE_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents?api-version=v1"
              CREATE_BODY=$(jq -n \
                --arg name "$AGENT_NAME" \
                --slurpfile def "$f" \
                '{
                  name: $name,
                  definition: $def[0]
                }')

              curl --fail-with-body --silent --show-error \
                -X POST \
                "$CREATE_URL" \
                -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$CREATE_BODY" \
                -o "$AGENT_JSON"
            elif [ "$STATUS" = "200" ]; then
              echo "Updating agent ${PROJECT_NAME}/${AGENT_NAME}"

              UPDATE_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"
              UPDATE_BODY=$(jq -n \
                --slurpfile def "$f" \
                '{
                  definition: $def[0]
                }')

              curl --fail-with-body --silent --show-error \
                -X POST \
                "$UPDATE_URL" \
                -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$UPDATE_BODY" \
                -o "$AGENT_JSON"
            else
              echo "Failed to check existing agent ${PROJECT_NAME}/${AGENT_NAME}: HTTP ${STATUS}"
              cat "$AGENT_JSON" || true
              exit 1
            fi

            echo "Agent response: $(cat "$AGENT_JSON")"

            AGENT_ID=$(jq -r '.id' "$AGENT_JSON")
            AGENT_VERSION=$(jq -r '.versions.latest.version' "$AGENT_JSON")

            if [ -z "$AGENT_ID" ] || [ "$AGENT_ID" = "null" ] || [ -z "$AGENT_VERSION" ] || [ "$AGENT_VERSION" = "null" ]; then
              echo "Failed to resolve agent id/version"
              cat "$AGENT_JSON" || true
              exit 1
            fi

            SAFE_AGENT_VERSION=$(printf '%s' "$AGENT_VERSION" | tr -c '[:alnum:]-' '-')
            DEPLOYMENT_NAME="${AGENT_NAME}-${SAFE_AGENT_VERSION}"
            DEPLOYMENT_ID="$DEPLOYMENT_NAME"

            # -----------------------------
            # 2. Ensure Application exists
            # -----------------------------
            APP_URL="https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.CognitiveServices/accounts/${AIFOUNDRY_ACCOUNT_NAME}/projects/${PROJECT_NAME}/applications/${AGENT_NAME}?api-version=${API_VERSION}"

            APP_BASE_BODY=$(jq -n \
              --arg displayName "$AGENT_NAME" \
              --arg description "Published agent application" \
              --arg baseUrl "${BASE_URL}/api/projects/${PROJECT_NAME}/applications/${AGENT_NAME}" \
              --arg agentId "$AGENT_ID" \
              --arg agentName "$AGENT_NAME" \
              '{
                properties: {
                  displayName: $displayName,
                  description: $description,
                  baseUrl: $baseUrl,
                  agents: [
                    {
                      agentId: $agentId,
                      agentName: $agentName
                    }
                  ],
                  authorizationPolicy: {
                    type: "Default"
                  }
                }
              }')

            APP_JSON=$(mktemp)

            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$APP_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$APP_BASE_BODY" \
              -o "$APP_JSON"

            echo "Application base response: $(cat "$APP_JSON")"

            # -----------------------------
            # 3. Create Deployment
            # -----------------------------
            DEPLOY_URL="https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.CognitiveServices/accounts/${AIFOUNDRY_ACCOUNT_NAME}/projects/${PROJECT_NAME}/applications/${AGENT_NAME}/agentDeployments/${DEPLOYMENT_NAME}?api-version=${API_VERSION}"

            DEPLOY_BODY=$(jq -n \
              --arg agentId "$AGENT_ID" \
              --arg agentName "$AGENT_NAME" \
              --arg agentVersion "$SAFE_AGENT_VERSION" \
              --arg deploymentId "$DEPLOYMENT_ID" \
              '{
                properties: {
                  agents: [
                    {
                      agentId: $agentId,
                      agentName: $agentName,
                      agentVersion: $agentVersion
                    }
                  ],
                  deploymentId: $deploymentId,
                  deploymentType: "Managed",
                  displayName: $agentName,
                  protocols: [
                    {
                      protocol: "Responses",
                      version: "1.0"
                    }
                  ],
                  state: "Running"
                }
              }')

            DEPLOY_JSON=$(mktemp)

            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$DEPLOY_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$DEPLOY_BODY" \
              -o "$DEPLOY_JSON"

            echo "Deployment response: $(cat "$DEPLOY_JSON")"

            DEPLOYMENT_ID=$(jq -r '.properties.deploymentId // empty' "$DEPLOY_JSON")

            if [ -z "$DEPLOYMENT_ID" ]; then
              DEPLOYMENT_ID="$DEPLOYMENT_NAME"
            fi

            # -----------------------------
            # 4. Update Application routing
            # -----------------------------
            APP_BODY=$(jq -n \
              --arg displayName "$AGENT_NAME" \
              --arg description "Published agent application" \
              --arg baseUrl "${BASE_URL}/api/projects/${PROJECT_NAME}/applications/${AGENT_NAME}" \
              --arg agentId "$AGENT_ID" \
              --arg agentName "$AGENT_NAME" \
              --arg deploymentId "$DEPLOYMENT_ID" \
              '{
                properties: {
                  displayName: $displayName,
                  description: $description,
                  baseUrl: $baseUrl,
                  agents: [
                    {
                      agentId: $agentId,
                      agentName: $agentName
                    }
                  ],
                  authorizationPolicy: {
                    type: "Default"
                  },
                  trafficRoutingPolicy: {
                    protocol: "FixedRatio",
                    rules: [
                      {
                        ruleId: "route-1",
                        description: "default route",
                        deploymentId: $deploymentId,
                        trafficPercentage: 100
                      }
                    ]
                  }
                }
              }')

            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$APP_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$APP_BODY" \
              -o "$APP_JSON"

            echo "Application updated: $(cat "$APP_JSON")"

          done <<< "$FILES"
