name: Deploy Agents

on:
  push:
    branches:
      - main
      - feature/*
      - refactor*

permissions:
  id-token: write
  contents: read

env:
  AIFOUNDRY_ACCOUNT_NAME: ${{ vars.AIFOUNDRY_ACCOUNT_NAME }}
  RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
  PROJECT_NAME: "prod"
  API_VERSION: "2025-10-01-preview"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get token
        id: token
        run: |
          AIFOUNDRY_TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "aifoundry_token=$AIFOUNDRY_TOKEN" >> "$GITHUB_OUTPUT"

          ARM_TOKEN=$(az account get-access-token \
            --resource https://management.azure.com/ \
            --query accessToken -o tsv)
          echo "arm_token=$ARM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Detect changed agent
        id: changes
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          ZERO="0000000000000000000000000000000000000000"

          # diff取得（initial commit対応）
          if [ "$BEFORE" = "$ZERO" ]; then
            if git rev-parse "${AFTER}^" >/dev/null 2>&1; then
              DIFF=$(git diff --name-status "${AFTER}^" "$AFTER")
            else
              DIFF=$(git diff-tree --root --no-commit-id --name-status -r "$AFTER")
            fi
          else
            DIFF=$(git diff --name-status "$BEFORE" "$AFTER")
          fi

          # agents配下のjsonだけ抽出
          TARGET=$(printf '%s\n' "$DIFF" \
            | awk '$2 ~ /^agents\/.*\.json$/ { print $1 ":" $2 }')

          COUNT=$(printf '%s\n' "$TARGET" | sed '/^$/d' | wc -l | tr -d ' ')

          if [ "$COUNT" -eq 0 ]; then
            echo "file=" >> "$GITHUB_OUTPUT"
            echo "status=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "Only one agent change is allowed"
            printf '%s\n' "$TARGET"
            exit 1
          fi

          STATUS=$(echo "$TARGET" | cut -d: -f1)
          FILE=$(echo "$TARGET" | cut -d: -f2)

          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Create agent or agent version for existing agent
        id: agent
        if: steps.changes.outputs.file != ''
        env:
          FOUNDRY_TOKEN: ${{ steps.token.outputs.aifoundry_token }}
          FILE: ${{ steps.changes.outputs.file }}
        run: |
          set -euo pipefail

          AIFOUNDRY_BASE_URL="https://${AIFOUNDRY_ACCOUNT_NAME}.services.ai.azure.com"

          AGENT_NAME=$(basename "$FILE" .json)

          echo "=== Processing ${AGENT_NAME} ==="

          GET_URL="${AIFOUNDRY_BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"
          GET_RESPONSE=$(curl --silent --show-error \
            -w "%{http_code}" \
            -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
            "$GET_URL" || true)

          STATUS="${GET_RESPONSE: -3}"
          AGENT_RESPONSE="${GET_RESPONSE%???}"

          if [ "$STATUS" = "404" ]; then
            echo "Creating new agent ${PROJECT_NAME}/${AGENT_NAME}"

            CREATE_URL="${AIFOUNDRY_BASE_URL}/api/projects/${PROJECT_NAME}/agents?api-version=v1"
            CREATE_BODY=$(jq -n \
              --arg name "$AGENT_NAME" \
              --slurpfile def "$FILE" \
              '{
                name: $name,
                definition: $def[0]
              }')

            AGENT_RESPONSE=$(
              curl --fail-with-body --silent --show-error \
                -X POST \
                "$CREATE_URL" \
                -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$CREATE_BODY"
            )
          elif [ "$STATUS" = "200" ]; then
            echo "Updating agent (create new agent version) ${PROJECT_NAME}/${AGENT_NAME}"

            UPDATE_URL="${AIFOUNDRY_BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"
            UPDATE_BODY=$(jq -n \
              --slurpfile def "$FILE" \
              '{
                definition: $def[0]
              }')

            AGENT_RESPONSE=$(
              curl --fail-with-body --silent --show-error \
                -X POST \
                "$UPDATE_URL" \
                -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$UPDATE_BODY"
            )
          else
            echo "Failed: HTTP ${STATUS}"
            echo "$AGENT_RESPONSE"
            exit 1
          fi

          echo "Agent response: $AGENT_RESPONSE"

          AGENT_ID=$(jq -r '.id' <<< "$AGENT_RESPONSE")
          AGENT_VERSION=$(jq -r '.versions.latest.version' <<< "$AGENT_RESPONSE")

          if [ -z "$AGENT_ID" ] || [ "$AGENT_ID" = "null" ] || [ -z "$AGENT_VERSION" ] || [ "$AGENT_VERSION" = "null" ]; then
            echo "Failed to resolve agent id/version"
            exit 1
          fi

          AGENT_STATE=$(jq -c -n \
            --arg agentName "$AGENT_NAME" \
            --arg agentId "$AGENT_ID" \
            --arg agentVersion "$AGENT_VERSION" \
            --arg appName "$AGENT_NAME" \
            '{
              agentName: $agentName,
              agentId: $agentId,
              agentVersion: $agentVersion,
              appName: $appName
            }')

          {
            echo "agent<<EOF"
            echo "$AGENT_STATE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update application
        if: steps.changes.outputs.file != ''
        env:
          ARM_TOKEN: ${{ steps.token.outputs.arm_token }}
          AGENT: ${{ steps.agent.outputs.agent }}
        run: |
          set -euo pipefail

          AGENT_NAME=$(jq -r '.agentName' <<< "$AGENT")
          AGENT_ID=$(jq -r '.agentId' <<< "$AGENT")
          APP_NAME=$(jq -r '.appName' <<< "$AGENT")

          APP_URL="https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.CognitiveServices/accounts/${AIFOUNDRY_ACCOUNT_NAME}/projects/${PROJECT_NAME}/applications/${APP_NAME}?api-version=${API_VERSION}"

          echo "=== Creating or updating application ${APP_NAME} ==="

          APP_BODY=$(jq -n \
            --arg displayName "$AGENT_NAME" \
            --arg description "Published agent application for ${AGENT_NAME}" \
            --arg agentId "$AGENT_ID" \
            --arg agentName "$AGENT_NAME" \
            '{
              properties: {
                agents: [
                  {
                    agentId: $agentId,
                    agentName: $agentName
                  }
                ],
                displayName: $displayName,
                description: $description
              }
            }')

          APP_RESPONSE=$(
            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$APP_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$APP_BODY"
          )

          echo "Application response: $APP_RESPONSE"

      - name: Create deployment
        if: steps.changes.outputs.file != ''
        id: deployment
        env:
          ARM_TOKEN: ${{ steps.token.outputs.arm_token }}
          AGENT: ${{ steps.agent.outputs.agent }}
        run: |
          set -euo pipefail

          AGENT_NAME=$(jq -r '.agentName' <<< "$AGENT")
          AGENT_VERSION=$(jq -r '.agentVersion' <<< "$AGENT")
          APP_NAME=$(jq -r '.appName' <<< "$AGENT")

          DEPLOYMENT_NAME="${APP_NAME}"

          DEPLOY_URL="https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.CognitiveServices/accounts/${AIFOUNDRY_ACCOUNT_NAME}/projects/${PROJECT_NAME}/applications/${APP_NAME}/agentDeployments/${DEPLOYMENT_NAME}?api-version=${API_VERSION}"

          echo "=== Creating deployment for ${APP_NAME} ==="

          DEPLOY_BODY=$(jq -n \
            --arg agentName "$AGENT_NAME" \
            --arg agentVersion "$AGENT_VERSION" \
            --arg displayName "${AGENT_NAME} deployment" \
            '{
              properties: {
                agents: [
                  {
                    agentName: $agentName,
                    agentVersion: $agentVersion
                  }
                ],
                deploymentType: "Managed",
                displayName: $displayName,
                protocols: [
                  {
                    protocol: "Responses",
                    version: "1.0"
                  }
                ],
                state: "Starting"
              }
            }')

          DEPLOY_RESPONSE=$(
            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$DEPLOY_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$DEPLOY_BODY"
          )

          echo "Deployment response: $DEPLOY_RESPONSE"

          DEPLOYMENT_ID=$(jq -r '.properties.deploymentId' <<< "$DEPLOY_RESPONSE")

          {
            echo "deployment<<EOF"
              jq -c --arg deploymentId "$DEPLOYMENT_ID" \
                '{
                  deploymentId: $deploymentId
                }'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update application to refer the new deployment
        if: steps.changes.outputs.file != ''
        env:
          ARM_TOKEN: ${{ steps.token.outputs.arm_token }}
          AGENT: ${{ steps.agent.outputs.agent }}
          DEPLOYMENT: ${{ steps.deployment.outputs.deployment }}
        run: |
          set -euo pipefail

          echo "DEPLOYMENT $DEPLOYMENT"

          AGENT_NAME=$(jq -r '.agentName' <<< "$AGENT")
          AGENT_ID=$(jq -r '.agentId' <<< "$AGENT")
          APP_NAME=$(jq -r '.appName' <<< "$AGENT")
          DEPLOYMENT_ID=$(jq -r '.deploymentId' <<< "$DEPLOYMENT")

          APP_URL="https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.CognitiveServices/accounts/${AIFOUNDRY_ACCOUNT_NAME}/projects/${PROJECT_NAME}/applications/${APP_NAME}?api-version=${API_VERSION}"

          echo "=== Linking deployment for ${APP_NAME} ==="

          APP_LINK_BODY=$(jq -n \
            --arg displayName "$AGENT_NAME" \
            --arg description "Published agent application for ${AGENT_NAME}" \
            --arg agentId "$AGENT_ID" \
            --arg agentName "$AGENT_NAME" \
            --arg deploymentId "$DEPLOYMENT_ID" \
            '{
              properties: {
                agents: [
                  {
                    agentId: $agentId,
                    agentName: $agentName
                  }
                ],
                displayName: $displayName,
                description: $description,
                authorizationPolicy: {
                  authorizationScheme: "Default"
                },
                trafficRoutingPolicy: {
                  protocol: "FixedRatio",
                  rules: [
                    {
                      ruleId: "default",
                      description: "Default rule",
                      deploymentId: $deploymentId,
                      trafficPercentage: 100
                    }
                  ]
                }
              }
            }')

          APP_LINK_RESPONSE=$(
            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$APP_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$APP_LINK_BODY"
          )

          echo "Application link response: $APP_LINK_RESPONSE"
