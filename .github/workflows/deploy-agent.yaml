name: Deploy Agents

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AIFOUNDRY_ACCOUNT_NAME: ${{ vars.AIFOUNDRY_ACCOUNT_NAME }}
  PROJECT_NAME: "prod"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect changed agents
        id: changes
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^agents/.*\.json$' || true)

          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get Foundry token
        id: token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy changed agents
        if: steps.changes.outputs.files != ''
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail

          FILES="${{ steps.changes.outputs.files }}"
          BASE_URL="https://${AIFOUNDRY_ACCOUNT_NAME}.services.ai.azure.com"

          while IFS= read -r f; do
            [ -z "$f" ] && continue

            AGENT_NAME=$(basename "$f" .json)
            # PROJECT_NAME=$(echo "$f" | awk -F'/' '{print $(NF-1)}')
            echo "Processing ${PROJECT_NAME}/${AGENT_NAME}"

            GET_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"
            CREATE_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents?api-version=v1"
            UPDATE_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"

            # 存在確認
            STATUS=$(curl -s -o /tmp/agent.json -w "%{http_code}" \
              -H "Authorization: Bearer ${TOKEN}" \
              "$GET_URL" || true)

            CREATE_BODY=$(jq -n \
              --arg name "$AGENT_NAME" \
              --slurpfile def "$f" \
              '{
                name: $name,
                definition: $def[0]
              }')

            UPDATE_BODY=$(jq -n \
              --slurpfile def "$f" \
              '{
                definition: $def[0]
              }')

            if [ "$STATUS" = "404" ]; then
              echo "Creating agent ${PROJECT_NAME}/${AGENT_NAME}"

              curl --fail-with-body --silent --show-error \
                -X POST \
                "$CREATE_URL" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$CREATE_BODY"

            elif [ "$STATUS" = "200" ]; then
              echo "Updating agent ${PROJECT_NAME}/${AGENT_NAME}"

              curl --fail-with-body --silent --show-error \
                -X POST \
                "$UPDATE_URL" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$UPDATE_BODY"

            else
              echo "Unexpected status code: $STATUS"
              cat /tmp/agent.json || true
              exit 1
            fi

          done <<< "$FILES"
