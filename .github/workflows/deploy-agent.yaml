name: Deploy Agents

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AIFOUNDRY_ACCOUNT_NAME: ${{ vars.AIFOUNDRY_ACCOUNT_NAME }}
  AIFOUNDRY_PROJECT_NAME: ${{ vars.AIFOUNDRY_PROJECT_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect changed agents
        id: changes
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^agents/.*\.json$' || true)

          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get Foundry token
        id: token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # ToDo: プロジェクト・エージェント未作成の場合は作成する

      - name: Deploy changed agents
        if: steps.changes.outputs.files != ''
        run: |
          set -euo pipefail

          FILES="${{ steps.changes.outputs.files }}"

          while IFS= read -r f; do
            [ -z "$f" ] && continue

            AGENT_NAME=$(basename "$f" .json)
            PROJECT_NAME=$(echo "$f" | awk -F'/' '{print $(NF-3)}')
            echo "Deploying ${PROJECT_NAME}/${AGENT_NAME}"

            BODY=$(jq -n \
              --arg name "$AGENT_NAME" \
              --slurpfile def "$f" \
              '{
                name: $name,
                definition: $def[0]
              }')

            curl --fail-with-body --silent --show-error \
              -X POST \
              "https://${{ env.AIFOUNDRY_ACCOUNT_NAME }}.services.ai.azure.com/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1" \
              -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
              -H "Content-Type: application/json" \
              -d "$BODY"
          done <<< "$FILES"
