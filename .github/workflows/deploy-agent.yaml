name: Deploy Agents

on:
  push:
    branches:
      - main
      - feature/*
      - check/*
      - fix/*

permissions:
  id-token: write
  contents: read

env:
  AIFOUNDRY_ACCOUNT_NAME: ${{ vars.AIFOUNDRY_ACCOUNT_NAME }}
  RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
  PROJECT_NAME: "prod"
  MODEL_CONFIG_FILE: "azure/infra/model-config.json"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect changed agents
        id: changes
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [ "$BEFORE_SHA" = "$ZERO_SHA" ]; then
            if git rev-parse "${AFTER_SHA}^" >/dev/null 2>&1; then
              DIFF_OUTPUT=$(git diff --name-status "${AFTER_SHA}^" "$AFTER_SHA")
            else
              DIFF_OUTPUT=$(git diff-tree --root --no-commit-id --name-status -r "$AFTER_SHA")
            fi
          else
            DIFF_OUTPUT=$(git diff --name-status "$BEFORE_SHA" "$AFTER_SHA")
          fi

          DEPLOY_FILES=$(printf '%s\n' "$DIFF_OUTPUT" \
            | awk '$1 != "D" && $2 ~ /^agents\/.*\.json$/ { print $2 }')
          DELETED_FILES=$(printf '%s\n' "$DIFF_OUTPUT" \
            | awk '$1 == "D" && $2 ~ /^agents\/.*\.json$/ { print $2 }')

          {
            echo "deploy_files<<EOF"
            echo "$DEPLOY_FILES"
            echo "EOF"
            echo "deleted_files<<EOF"
            echo "$DELETED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log deleted agents
        if: steps.changes.outputs.deleted_files != ''
        env:
          DELETED_FILES: ${{ steps.changes.outputs.deleted_files }}
        run: |
          echo "Skipping deleted agent definitions:"
          echo "$DELETED_FILES"

      - name: Get Foundry token
        id: foundry_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get ARM token
        id: arm_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://management.azure.com/ \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Create or update changed agents
        id: agents
        if: steps.changes.outputs.deploy_files != ''
        env:
          FOUNDRY_TOKEN: ${{ steps.foundry_token.outputs.token }}
          FILES: ${{ steps.changes.outputs.deploy_files }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          bash .github/scripts/deploy_agent/run.sh collect-agents

      - name: Ensure model deployments exist
        if: steps.changes.outputs.deploy_files != ''
        env:
          AGENTS: ${{ steps.agents.outputs.agents }}
        run: |
          bash .github/scripts/deploy_agent/run.sh deploy-models

      - name: Deploy applications and agent deployments
        if: steps.changes.outputs.deploy_files != ''
        env:
          AGENTS: ${{ steps.agents.outputs.agents }}
        run: |
          bash .github/scripts/deploy_agent/run.sh deploy-agent-infra

      - name: Create or update applications
        if: steps.changes.outputs.deploy_files != ''
        env:
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
          AGENTS: ${{ steps.agents.outputs.agents }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          bash .github/scripts/deploy_agent/run.sh upsert-applications

      - name: Create deployments
        id: deployments
        if: steps.changes.outputs.deploy_files != ''
        env:
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
          AGENTS: ${{ steps.agents.outputs.agents }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          bash .github/scripts/deploy_agent/run.sh create-deployments

      - name: Link deployments to applications
        if: steps.changes.outputs.deploy_files != ''
        env:
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
          AGENTS: ${{ steps.deployments.outputs.agents }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          bash .github/scripts/deploy_agent/run.sh link-deployments
