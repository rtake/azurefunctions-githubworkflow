name: Deploy Agents

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AIFOUNDRY_ACCOUNT_NAME: ${{ vars.AIFOUNDRY_ACCOUNT_NAME }}
  RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
  PROJECT_NAME: "prod"
  API_VERSION: "2025-10-01-preview"
  PROJECT_API_VERSION: "2025-11-15-preview"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect changed agents
        id: changes
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^agents/.*\.json$' || true)

          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get Foundry token
        id: foundry_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get ARM token
        id: arm_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://management.azure.com/ \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy changed agents
        if: steps.changes.outputs.files != ''
        env:
          FOUNDRY_TOKEN: ${{ steps.foundry_token.outputs.token }}
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
        run: |
          set -euo pipefail

          FILES="${{ steps.changes.outputs.files }}"
          BASE_URL="https://${AIFOUNDRY_ACCOUNT_NAME}.services.ai.azure.com"

          while IFS= read -r f; do
            [ -z "$f" ] && continue

            AGENT_NAME=$(basename "$f" .json)
            echo "Processing ${PROJECT_NAME}/${AGENT_NAME}"

            GET_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"
            CREATE_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents?api-version=v1"
            UPDATE_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"

            AGENT_JSON=$(mktemp)

            STATUS=$(curl -s -o "$AGENT_JSON" -w "%{http_code}" \
              -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
              "$GET_URL" || true)

            CREATE_BODY=$(jq -n \
              --arg name "$AGENT_NAME" \
              --slurpfile def "$f" \
              '{
                name: $name,
                definition: $def[0]
              }')

            UPDATE_BODY=$(jq -n \
              --slurpfile def "$f" \
              '{
                definition: $def[0]
              }')

            if [ "$STATUS" = "404" ]; then
              echo "Creating agent ${PROJECT_NAME}/${AGENT_NAME}"

              curl --fail-with-body --silent --show-error \
                -X POST \
                "$CREATE_URL" \
                -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$CREATE_BODY" \
                -o "$AGENT_JSON"

            elif [ "$STATUS" = "200" ]; then
              echo "Updating agent ${PROJECT_NAME}/${AGENT_NAME}"

              curl --fail-with-body --silent --show-error \
                -X POST \
                "$UPDATE_URL" \
                -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$UPDATE_BODY" \
                -o "$AGENT_JSON"

            else
              echo "Unexpected status code: $STATUS"
              cat "$AGENT_JSON" || true
              exit 1
            fi

            AGENT_ID=$(jq -r '.id' "$AGENT_JSON")
            AGENT_VERSION=$(jq -r '.versions.latest.version' "$AGENT_JSON")

            if [ -z "$AGENT_ID" ] || [ "$AGENT_ID" = "null" ] || [ -z "$AGENT_VERSION" ] || [ "$AGENT_VERSION" = "null" ]; then
              echo "Failed to resolve agent id/version for ${AGENT_NAME}"
              cat "$AGENT_JSON" || true
              exit 1
            fi

            APP_NAME="${AGENT_NAME}"
            DEPLOYMENT_NAME="default"

            APP_URL="https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.CognitiveServices/accounts/${AIFOUNDRY_ACCOUNT_NAME}/projects/${PROJECT_NAME}/applications/${APP_NAME}?api-version=${API_VERSION}"
            DEPLOY_URL="https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.CognitiveServices/accounts/${AIFOUNDRY_ACCOUNT_NAME}/projects/${PROJECT_NAME}/applications/${APP_NAME}/agentDeployments/${DEPLOYMENT_NAME}?api-version=${API_VERSION}"
            APP_JSON=$(mktemp)
            DEPLOY_JSON=$(mktemp)

            APP_BODY=$(jq -n \
              --arg displayName "$AGENT_NAME" \
              --arg description "Published agent application for ${AGENT_NAME}" \
              --slurpfile agent "$AGENT_JSON" \
              '{
                properties: {
                  agents: [
                    {
                      agentId: $agent[0].id,
                      agentName: $agent[0].name,
                    }
                  ],
                  displayName: $displayName,
                  description: $description
                }
              }')

            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$APP_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$APP_BODY" \
              -o "$APP_JSON"

            APP_AGENT_ID=$(jq -r '.properties.agents[0].agentId' "$APP_JSON")
            APP_AGENT_NAME=$(jq -r '.properties.agents[0].agentName' "$APP_JSON")
            APP_DEPLOYMENT_ID=$(jq -r '.properties.trafficRoutingPolicy.rules[0].deploymentId // empty' "$APP_JSON")

            if [ -z "$APP_AGENT_ID" ] || [ "$APP_AGENT_ID" = "null" ] || \
               [ "$APP_AGENT_NAME" != "$AGENT_NAME" ]; then
              echo "Application API response does not contain the expected agent for ${AGENT_NAME}"
              cat "$APP_JSON" || true
              exit 1
            fi

            echo "Deploying agent ${AGENT_NAME} with version ${AGENT_VERSION}"

            DEPLOY_STATUS=$(curl -s -o "$DEPLOY_JSON" -w "%{http_code}" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              "$DEPLOY_URL" || true)

            if [ "$DEPLOY_STATUS" = "200" ]; then
              DEPLOY_BODY=$(jq -n \
                --slurpfile app "$APP_JSON" \
                --slurpfile deploy "$DEPLOY_JSON" \
                --arg agentVersion "$AGENT_VERSION" \
                '{
                  properties:
                    ($deploy[0].properties + {
                      agents: [
                        {
                          agentId: $app[0].properties.agents[0].agentId,
                          agentName: $app[0].properties.agents[0].agentName,
                          agentVersion: $agentVersion
                        }
                      ]
                    })
                }')
            else
              DEPLOY_BODY=$(jq -n \
                --slurpfile app "$APP_JSON" \
                --arg agentVersion "$AGENT_VERSION" \
                --arg deploymentId "$APP_DEPLOYMENT_ID" \
                --arg description "Published deployment for ${AGENT_NAME}" \
                --arg displayName "${AGENT_NAME} deployment" \
                '{
                  properties: {
                    agents: [
                      {
                        agentId: $app[0].properties.agents[0].agentId,
                        agentName: $app[0].properties.agents[0].agentName,
                        agentVersion: $agentVersion
                      }
                    ],
                    deploymentId: $deploymentId,
                    deploymentType: "Managed",
                    description: $description,
                    displayName: $displayName,
                    state: "Starting",
                    protocols: [
                      {
                        version: "1.0",
                        protocol: "Responses"
                      }
                    ]
                  }
                }')
            fi

            echo "Deploy body: $DEPLOY_BODY"

            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$DEPLOY_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$DEPLOY_BODY" \
              -o "$DEPLOY_JSON"

            TARGET_DEPLOYMENT_ID=$(jq -r '.properties.deploymentId // empty' "$DEPLOY_JSON")

            if [ -z "$TARGET_DEPLOYMENT_ID" ]; then
              echo "Deployment API response does not contain deploymentId for ${AGENT_NAME}"
              cat "$DEPLOY_JSON" || true
              exit 1
            fi

            APP_GET_STATUS=$(curl -s -o "$APP_JSON" -w "%{http_code}" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              "$APP_URL")

            if [ "$APP_GET_STATUS" != "200" ]; then
              echo "Failed to refresh application before routing update: ${AGENT_NAME}"
              cat "$APP_JSON" || true
              exit 1
            fi

            APP_ROUTE_BODY=$(jq -n \
              --slurpfile app "$APP_JSON" \
              --arg deploymentId "$TARGET_DEPLOYMENT_ID" \
              '{
                properties:
                  ($app[0].properties
                    | .trafficRoutingPolicy.protocol = (.trafficRoutingPolicy.protocol // "FixedRatio")
                    | .trafficRoutingPolicy.rules = (
                        if (.trafficRoutingPolicy.rules // [] | any(.ruleId == "default")) then
                          (.trafficRoutingPolicy.rules
                            | map(if .ruleId == "default" then . + { deploymentId: $deploymentId } else . end))
                        else
                          ((.trafficRoutingPolicy.rules // []) + [
                            {
                              ruleId: "default",
                              description: "Default rule routing all traffic to the latest deployment",
                              deploymentId: $deploymentId,
                              trafficPercentage: 100
                            }
                          ])
                        end
                      ))
              }')

            echo "Updating application routing for ${AGENT_NAME} to deploymentId ${TARGET_DEPLOYMENT_ID}"

            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$APP_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$APP_ROUTE_BODY" \
              -o "$APP_JSON"

            FINAL_DEPLOY_STATUS=$(curl -s -o "$DEPLOY_JSON" -w "%{http_code}" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              "$DEPLOY_URL")

            if [ "$FINAL_DEPLOY_STATUS" != "200" ]; then
              echo "Failed to fetch deployment provisioningState for ${AGENT_NAME}"
              cat "$DEPLOY_JSON" || true
              exit 1
            fi

            FINAL_APP_STATUS=$(curl -s -o "$APP_JSON" -w "%{http_code}" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              "$APP_URL")

            if [ "$FINAL_APP_STATUS" != "200" ]; then
              echo "Failed to fetch application provisioningState for ${AGENT_NAME}"
              cat "$APP_JSON" || true
              exit 1
            fi

            DEPLOY_PROVISIONING_STATE=$(jq -r '.properties.provisioningState // .provisioningState // empty' "$DEPLOY_JSON")
            APP_PROVISIONING_STATE=$(jq -r '.properties.provisioningState // .provisioningState // empty' "$APP_JSON")

            echo "Deployment provisioningState for ${AGENT_NAME}: ${DEPLOY_PROVISIONING_STATE:-<empty>}"
            echo "Application provisioningState for ${AGENT_NAME}: ${APP_PROVISIONING_STATE:-<empty>}"

          done <<< "$FILES"
