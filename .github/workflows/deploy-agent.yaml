name: Deploy Agents

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AIFOUNDRY_ACCOUNT_NAME: ${{ vars.AIFOUNDRY_ACCOUNT_NAME }}
  RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
  PROJECT_NAME: "prod"
  API_VERSION: "2025-10-01-preview"
  PROJECT_API_VERSION: "2025-11-15-preview"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect changed agents
        id: changes
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^agents/.*\.json$' || true)

          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get Foundry token
        id: foundry_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy changed agents
        if: steps.changes.outputs.files != ''
        env:
          FOUNDRY_TOKEN: ${{ steps.foundry_token.outputs.token }}
        run: |
          set -euo pipefail

          FILES="${{ steps.changes.outputs.files }}"
          BASE_URL="https://${AIFOUNDRY_ACCOUNT_NAME}.services.ai.azure.com"

          while IFS= read -r f; do
            [ -z "$f" ] && continue

            AGENT_NAME=$(basename "$f" .json)
            echo "Processing ${PROJECT_NAME}/${AGENT_NAME}"

            GET_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"
            CREATE_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents?api-version=v1"
            UPDATE_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"

            AGENT_JSON=$(mktemp)

            STATUS=$(curl -s -o "$AGENT_JSON" -w "%{http_code}" \
              -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
              "$GET_URL" || true)

            CREATE_BODY=$(jq -n \
              --arg name "$AGENT_NAME" \
              --slurpfile def "$f" \
              '($def[0] + {name: $name})
              | {
                  name,
                  model,
                  description,
                  instructions,
                  tools: (.tools // []),
                  metadata: (.metadata // {})
                }')

            UPDATE_BODY=$(jq -n \
              --arg name "$AGENT_NAME" \
              --slurpfile def "$f" \
              '($def[0] + {name: $name})
              | {
                  name,
                  model,
                  description,
                  instructions,
                  tools: (.tools // []),
                  metadata: (.metadata // {})
                }')

            if [ "$STATUS" = "404" ]; then
              echo "Creating agent ${PROJECT_NAME}/${AGENT_NAME}"

              curl --fail-with-body --silent --show-error \
                -X POST \
                "$CREATE_URL" \
                -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$CREATE_BODY" \
                -o "$AGENT_JSON"

            elif [ "$STATUS" = "200" ]; then
              echo "Updating agent ${PROJECT_NAME}/${AGENT_NAME}"

              curl --fail-with-body --silent --show-error \
                -X POST \
                "$UPDATE_URL" \
                -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$UPDATE_BODY" \
                -o "$AGENT_JSON"

            else
              echo "Unexpected status code: $STATUS"
              cat "$AGENT_JSON" || true
              exit 1
            fi

            AGENT_VERSION=$(jq -r '.versions.latest.version' "$AGENT_JSON")

            if [ -z "$AGENT_VERSION" ] || [ "$AGENT_VERSION" = "null" ]; then
              echo "Failed to resolve agent version for ${AGENT_NAME}"
              cat "$AGENT_JSON" || true
              exit 1
            fi

            APP_NAME="${AGENT_NAME}"
            DEPLOYMENT_ID=$(uuidgen | tr '[:upper:]' '[:lower:]')

            echo "Deploying agent ${AGENT_NAME} with version ${AGENT_VERSION}"

            az deployment group create \
              --resource-group "${RESOURCE_GROUP_NAME}" \
              --name "publish-agent-${APP_NAME}-${AGENT_VERSION}" \
              --template-file "azure/infra/agent-publish.bicep" \
              --parameters \
                accountName="${AIFOUNDRY_ACCOUNT_NAME}" \
                projectName="${PROJECT_NAME}" \
                agentName="${APP_NAME}" \
                subscriptionId="${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
                resourceGroupName="${RESOURCE_GROUP_NAME}" \
                agentVersion="${AGENT_VERSION}" \
                deploymentId="${DEPLOYMENT_ID}"

          done <<< "$FILES"
