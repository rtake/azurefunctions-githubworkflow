name: Deploy Agents

on:
  push:
    branches:
      - main
      - feature/*

permissions:
  id-token: write
  contents: read

env:
  AIFOUNDRY_ACCOUNT_NAME: ${{ vars.AIFOUNDRY_ACCOUNT_NAME }}
  RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
  PROJECT_NAME: "prod"
  API_VERSION: "2025-10-01-preview"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect changed agent
        id: changes
        run: |
          set -euo pipefail

          # ToDo: 最初のコミットの時に変更検知ができないバグを修正
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^agents/.*\.json$' || true)
          COUNT=$(printf '%s\n' "$CHANGED" | sed '/^$/d' | wc -l | tr -d ' ')

          if [ "$COUNT" -eq 0 ]; then
            echo "file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "Single-agent workflow expects exactly one changed agent file."
            printf '%s\n' "$CHANGED"
            exit 1
          fi

          AGENT_FILE=$(printf '%s\n' "$CHANGED" | sed '/^$/d' | head -n1)
          echo "file=$AGENT_FILE" >> "$GITHUB_OUTPUT"

      - name: Get Foundry token
        id: foundry_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get ARM token
        id: arm_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://management.azure.com/ \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Create or update agent and create version
        id: agent
        if: steps.changes.outputs.file != ''
        env:
          FOUNDRY_TOKEN: ${{ steps.foundry_token.outputs.token }}
          AGENT_FILE: ${{ steps.changes.outputs.file }}
        run: |
          set -euo pipefail

          BASE_URL="https://${AIFOUNDRY_ACCOUNT_NAME}.services.ai.azure.com"
          AGENT_NAME=$(basename "$AGENT_FILE" .json)

          echo "=== Processing ${AGENT_NAME} ==="

          # レスポンスボディの末尾にステータスコードを付与
          # ToDo: 可読性が下がるため本文とステータスを分けて取る方法に変更
          GET_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}?api-version=v1"
          GET_RESPONSE=$(curl --silent --show-error \
            -w "%{http_code}" \
            -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
            "$GET_URL" || true)
          STATUS="${GET_RESPONSE: -3}"
          AGENT_RESPONSE="${GET_RESPONSE%???}"

          echo "GET_RESPONSE $GET_RESPONSE"

          if [ "$STATUS" = "404" ]; then
            echo "Creating agent ${PROJECT_NAME}/${AGENT_NAME}"

            CREATE_URL="${BASE_URL}/api/projects/${PROJECT_NAME}/agents?api-version=v1"
            CREATE_BODY=$(jq -n \
              --arg name "$AGENT_NAME" \
              --slurpfile def "$AGENT_FILE" \
              '{
                name: $name,
                definition: $def[0]
              }')

            AGENT_RESPONSE=$(
              curl --fail-with-body --silent --show-error \
                -X POST \
                "$CREATE_URL" \
                -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$CREATE_BODY"
            )

          fi

          echo "Agent response: $AGENT_RESPONSE"

          CREATE_VERSION_BODY=$(jq -n \
            --slurpfile def "$AGENT_FILE" \
            '{
              definition: $def[0]
            }')

          CREATE_VERSION_RESPONSE=$(
            curl --fail-with-body --silent --show-error \
              -X POST \
              "${BASE_URL}/api/projects/${PROJECT_NAME}/agents/${AGENT_NAME}/versions?api-version=v1" \
              -H "Authorization: Bearer ${FOUNDRY_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$CREATE_VERSION_BODY"
          )

          echo "Agent version response: $CREATE_VERSION_RESPONSE"

          AGENT_ID=$(jq -r '.id // .agentId // empty' <<< "$CREATE_VERSION_RESPONSE")
          AGENT_VERSION=$(jq -r '.version // .versions.latest.version // empty' <<< "$CREATE_VERSION_RESPONSE")

          if [ -z "$AGENT_ID" ] || [ "$AGENT_ID" = "null" ] || [ -z "$AGENT_VERSION" ] || [ "$AGENT_VERSION" = "null" ]; then
            echo "Failed to resolve agent id/version"
            echo "$AGENT_RESPONSE"
            echo "$CREATE_VERSION_RESPONSE"
            exit 1
          fi

          AGENT_STATE=$(jq -c -n \
            --arg agentName "$AGENT_NAME" \
            --arg agentId "$AGENT_ID" \
            --arg agentVersion "$AGENT_VERSION" \
            --arg appName "$AGENT_NAME" \
            '{
              agentName: $agentName,
              agentId: $agentId,
              agentVersion: $agentVersion,
              appName: $appName
            }')

          {
            echo "agent<<EOF"
            echo "$AGENT_STATE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update deployment for the uploaded agent
        id: deployment
        if: steps.agent.outputs.agent != ''
        env:
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
          AGENT: ${{ steps.agent.outputs.agent }}
        run: |
          set -euo pipefail

          BASE_URL="https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.CognitiveServices/accounts/${AIFOUNDRY_ACCOUNT_NAME}/projects/${PROJECT_NAME}"
          AGENT_NAME=$(jq -r '.agentName' <<< "$AGENT")
          AGENT_VERSION=$(jq -r '.agentVersion' <<< "$AGENT")
          APP_NAME=$(jq -r '.appName' <<< "$AGENT")

          DEPLOYMENT_NAME="$AGENT_NAME-$AGENT_VERSION"
          DEPLOY_URL="${BASE_URL}/applications/${APP_NAME}/agentDeployments/${DEPLOYMENT_NAME}?api-version=${API_VERSION}"
          echo "DEPLOY_URL $DEPLOY_URL"

          echo "=== Creating or updating deployment ${APP_NAME}/${DEPLOYMENT_NAME} ==="

          sleep 60

          DEPLOY_BODY=$(jq -n \
            --arg agentName "$AGENT_NAME" \
            --arg agentVersion "$AGENT_VERSION" \
            --arg displayName "${AGENT_NAME} deployment" \
            '{
              properties: {
                agents: [
                  {
                    agentName: $agentName,
                    agentVersion: $agentVersion
                  }
                ],
                deploymentType: "Managed",
                displayName: $displayName,
                protocols: [
                  {
                    protocol: "Responses",
                    version: "1.0"
                  }
                ],
                state: "Running"
              }
            }')

          echo "DEPLOY_BODY $DEPLOY_BODY"

          DEPLOY_RESPONSE=$(
            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$DEPLOY_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$DEPLOY_BODY"
          )

          echo "Deployment response: $DEPLOY_RESPONSE"

          DEPLOYMENT_ID=$(jq -r '.properties.deploymentId // empty' <<< "$DEPLOY_RESPONSE")
          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" = "null" ]; then
            echo "Failed to resolve deployment id"
            echo "$DEPLOY_RESPONSE"
            exit 1
          fi

          DEPLOYMENT_STATE=$(jq -c -n \
            --arg deploymentId "$DEPLOYMENT_ID" \
            --arg deploymentName "$DEPLOYMENT_NAME" \
            --arg appName "$APP_NAME" \
            '{
              deploymentId: $deploymentId,
              deploymentName: $deploymentName,
              appName: $appName
            }')

          {
            echo "deployment<<EOF"
            echo "$DEPLOYMENT_STATE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update application to refer the uploaded agent and deployment
        if: steps.agent.outputs.agent != ''
        env:
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
          AGENT: ${{ steps.agent.outputs.agent }}
          DEPLOYMENT: ${{ steps.deployment.outputs.deployment }}
        run: |
          set -euo pipefail

          AGENT_NAME=$(jq -r '.agentName' <<< "$AGENT")
          AGENT_ID=$(jq -r '.agentId' <<< "$AGENT")
          APP_NAME=$(jq -r '.appName' <<< "$AGENT")
          DEPLOYMENT_ID=$(jq -r '.deploymentId' <<< "$DEPLOYMENT")

          APP_URL="https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.CognitiveServices/accounts/${AIFOUNDRY_ACCOUNT_NAME}/projects/${PROJECT_NAME}/applications/${APP_NAME}?api-version=${API_VERSION}"

          echo "=== Creating or updating application ${APP_NAME} ==="

          APP_BODY=$(jq -n \
            --arg displayName "$AGENT_NAME" \
            --arg description "Published agent application for ${AGENT_NAME}" \
            --arg agentId "$AGENT_ID" \
            --arg agentName "$AGENT_NAME" \
            --arg deploymentId "$DEPLOYMENT_ID" \
            '{
              properties: {
                agents: [
                  {
                    agentId: $agentId,
                    agentName: $agentName
                  }
                ],
                displayName: $displayName,
                description: $description,
                authorizationPolicy: {
                  authorizationScheme: "Default"
                },
                trafficRoutingPolicy: {
                  protocol: "FixedRatio",
                  rules: [
                    {
                      ruleId: "default",
                      description: "Default rule routing all traffic to the active deployment",
                      deploymentId: $deploymentId,
                      trafficPercentage: 100
                    }
                  ]
                }
              }
            }')

          APP_RESPONSE=$(
            curl --fail-with-body --silent --show-error \
              -X PUT \
              "$APP_URL" \
              -H "Authorization: Bearer ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$APP_BODY"
          )

          echo "Application response: $APP_RESPONSE"
