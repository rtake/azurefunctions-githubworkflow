name: Deploy Agents

on:
  push:
    branches:
      - main
      - feature/*

permissions:
  id-token: write
  contents: read

env:
  AIFOUNDRY_ACCOUNT_NAME: ${{ vars.AIFOUNDRY_ACCOUNT_NAME }}
  RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
  PROJECT_NAME: "prod"
  API_VERSION: "2025-10-01-preview"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Detect changed agents
        id: changes
        run: |
          DEPLOY_FILES=$(git diff --name-status "${{ github.event.before }}" "${{ github.sha }}" \
            | awk '$1 != "D" && $2 ~ /^agents\/.*\.json$/ { print $2 }')
          DELETED_FILES=$(git diff --name-status "${{ github.event.before }}" "${{ github.sha }}" \
            | awk '$1 == "D" && $2 ~ /^agents\/.*\.json$/ { print $2 }')

          {
            echo "deploy_files<<EOF"
            echo "$DEPLOY_FILES"
            echo "EOF"
            echo "deleted_files<<EOF"
            echo "$DELETED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log deleted agents
        if: steps.changes.outputs.deleted_files != ''
        env:
          DELETED_FILES: ${{ steps.changes.outputs.deleted_files }}
        run: |
          echo "Skipping deleted agent definitions:"
          echo "$DELETED_FILES"

      - name: Get Foundry token
        id: foundry_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://ai.azure.com \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get ARM token
        id: arm_token
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://management.azure.com/ \
            --query accessToken -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Create or update changed agents
        id: agents
        if: steps.changes.outputs.deploy_files != ''
        env:
          FOUNDRY_TOKEN: ${{ steps.foundry_token.outputs.token }}
          FILES: ${{ steps.changes.outputs.deploy_files }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          bash .github/scripts/deploy_agent/run.sh collect-agents

      - name: Create or update applications
        if: steps.changes.outputs.deploy_files != ''
        env:
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
          AGENTS: ${{ steps.agents.outputs.agents }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          bash .github/scripts/deploy_agent/run.sh upsert-applications

      - name: Create deployments
        id: deployments
        if: steps.changes.outputs.deploy_files != ''
        env:
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
          AGENTS: ${{ steps.agents.outputs.agents }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          bash .github/scripts/deploy_agent/run.sh create-deployments

      - name: Link deployments to applications
        if: steps.changes.outputs.deploy_files != ''
        env:
          ARM_TOKEN: ${{ steps.arm_token.outputs.token }}
          AGENTS: ${{ steps.deployments.outputs.agents }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          bash .github/scripts/deploy_agent/run.sh link-deployments
